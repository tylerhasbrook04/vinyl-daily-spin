<style>
  :root {
    --a:  #9333ea; /* accent */
    --ah: #7c3aed; /* accent hover */
    --at: #c084fc; /* accent text */
    --al: #e9d5ff; /* accent text light */
    --ar: 147; --ag: 51; --ab: 234; /* RGB for rgba() */
  }
  body { background: #09080f; color: #f3f4f6; font-family: system-ui, sans-serif; }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fade-in { animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
  .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:#0d0b18; } ::-webkit-scrollbar-thumb { background:var(--a); border-radius:3px; }
  .nav-link { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; transition:all .15s; color:#9ca3af; border:1px solid transparent; }
  .nav-link:hover { background:rgba(var(--ar),var(--ag),var(--ab),.08); color:var(--al); }
  .nav-link.active { background:rgba(var(--ar),var(--ag),var(--ab),.18); color:var(--at); border-color:rgba(var(--ar),var(--ag),var(--ab),.3); }
  .btn-amber { background:var(--a); color:#fff; padding:10px 20px; border-radius:10px; font-weight:600; font-size:14px; cursor:pointer; transition:all .15s; border:none; }
  .btn-amber:hover { background:var(--ah); }
  .btn-amber:disabled { opacity:.5; cursor:not-allowed; }
  .btn-gray { background:#1a1232; color:#d1d5db; padding:10px 20px; border-radius:10px; font-weight:500; font-size:14px; cursor:pointer; transition:all .15s; border:1px solid rgba(var(--ar),var(--ag),var(--ab),.25); }
  .btn-gray:hover { background:rgba(var(--ar),var(--ag),var(--ab),.12); }
  .card { background:#100d1e; border:1px solid #1e1535; border-radius:16px; padding:20px; }
  .card:hover { border-color:rgba(var(--ar),var(--ag),var(--ab),.3); }
  .input { background:#1a1232; border:1px solid rgba(var(--ar),var(--ag),var(--ab),.25); color:#f3f4f6; padding:10px 14px; border-radius:10px; font-size:14px; width:100%; outline:none; transition:border .15s; }
  .input:focus { border-color:var(--a); }
  .input::placeholder { color:#6b7280; }
  select.input option { background:#1a1232; }
  .mood-pill { padding:4px 10px; border-radius:20px; font-size:12px; font-weight:500; }
  .genre-pill { background:rgba(var(--ar),var(--ag),var(--ab),.2); color:var(--at); padding:4px 10px; border-radius:20px; font-size:12px; font-weight:500; }
  #sidebar { transition: transform .25s; background: linear-gradient(180deg, #0f0b1e 0%, #0a0815 100%); }
  #overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:30; }
  .vinyl-groove { background: repeating-radial-gradient(circle at center, transparent 0px, transparent 8px, rgba(255,255,255,0.03) 8px, rgba(255,255,255,0.03) 9px); }
  /* Tailwind purple override — updated by applyTheme() */
  .theme-accent-fill { fill: var(--a) !important; }
  .theme-swatch { width:18px; height:18px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform .15s, border-color .15s; flex-shrink:0; }
  .theme-swatch:hover { transform:scale(1.2); }
  .theme-swatch.active { border-color:rgba(255,255,255,0.6); transform:scale(1.15); }
</style>

<!-- BULK ART PROGRESS MODAL -->
<div id="bulk-art-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(0,0,0,0.85)">

</div>

<!-- SETTINGS MODAL -->
<div id="settings-modal" class="hidden fixed inset-0 z-50 flex items-end justify-center md:items-center p-4" style="background:rgba(0,0,0,0.75)" onclick="closeSettings()">

      <button onclick="closeSettings()" class="text-gray-500 hover:text-white text-xl leading-none">✕</button>

    <div style="border-top:1px solid rgba(255,255,255,0.06)" class="my-4"></div>

    <!-- Listening Goal -->
    <div class="mb-5">
      <p class="text-xs font-semibold uppercase tracking-widest text-gray-500 mb-3">Listening Goal</p>

// ─── HELPERS ──────────────────────────────────────────────────────────────────

// Normalize any common date format to YYYY-MM-DD
function normalizeDate(str) {
  if (!str) return '';
  str = String(str).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str; // already YYYY-MM-DD
  // M/D/YYYY or MM/DD/YYYY
  const mdy = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (mdy) return `${mdy[3]}-${mdy[1].padStart(2,'0')}-${mdy[2].padStart(2,'0')}`;
  // D/M/YYYY (less common but possible)
  const dmy = str.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
  if (dmy) return `${dmy[3]}-${dmy[2].padStart(2,'0')}-${dmy[1].padStart(2,'0')}`;
  // Google Sheets serial number (days since Dec 30 1899)
  const n = Number(str);
  if (!isNaN(n) && n > 1000 && n < 100000) {
    const d = new Date(Math.round((n - 25569) * 86400000));
    return d.toLocaleDateString('en-CA');
  }
  // Try native Date parse as last resort
  try { const d = new Date(str); if (!isNaN(d)) return d.toLocaleDateString('en-CA'); } catch(e) {}
  return str;
}

const colLetter = (n) => { let s=''; while(n>=0){s=String.fromCharCode((n%26)+65)+s; n=Math.floor(n/26)-1;} return s; };

// Google occasionally returns a transient 500 "Internal error encountered" on
// otherwise-valid Sheets API calls (confirmed live: the exact same request
// failed then succeeded seconds later with no code change). Retry on 5xx /
// network failure only — never on 4xx, since those need real auth action.
async function _sheetsFetch(url, options, retries) {
  retries = retries == null ? 2 : retries;
  for (let attempt = 0; attempt <= retries; attempt++) {
    try {
      const r = await fetch(url, options);
      if (r.status >= 500 && attempt < retries) {
        await new Promise(res => setTimeout(res, 1000 * (attempt + 1)));
        continue;
      }
      return r;
    } catch (e) {
      if (attempt < retries) { await new Promise(res => setTimeout(res, 1000 * (attempt + 1))); continue; }
      throw e;
    }
  }
}

async function sheetsGet(range) {
  const r = await _sheetsFetch(`https://sheets.googleapis.com/v4/spreadsheets/${S.sheetId}/values/${encodeURIComponent(range)}`,
    { headers:{ Authorization:`Bearer ${S.token}` } });
  if (!r.ok) { const t=await r.text(); throw new Error(`Sheets error: ${t}`); }
  return (await r.json()).values || [];
}

async function sheetsBatchUpdate(data) {
  const r = await _sheetsFetch(`https://sheets.googleapis.com/v4/spreadsheets/${S.sheetId}/values:batchUpdate`,
    { method:'POST', headers:{ Authorization:`Bearer ${S.token}`, 'Content-Type':'application/json' },
      body: JSON.stringify({ valueInputOption:'RAW', data }) });
  if (!r.ok) { const t=await r.text(); throw new Error(`Sheets update error: ${t}`); }
  return r.json();
}

async function sheetsAppend(range, values) {
  const r = await _sheetsFetch(`https://sheets.googleapis.com/v4/spreadsheets/${S.sheetId}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED`,
    { method:'POST', headers:{ Authorization:`Bearer ${S.token}`, 'Content-Type':'application/json' },
      body: JSON.stringify({ values }) });
  if (!r.ok) { const t=await r.text(); throw new Error(`Sheets append error: ${t}`); }
  return r.json();
}

const COL_ALIASES = {
  Album: 'AlbumTitle', Title: 'AlbumTitle', 'Album Title': 'AlbumTitle', Name: 'AlbumTitle',
  Score: 'Rating', Ranking: 'Rating', Rank: 'Rating', Grade: 'Rating', Stars: 'Rating',
  'Favorite Song': 'FavoriteTrack', 'Fav Song': 'FavoriteTrack', 'Favorite Track': 'FavoriteTrack', 'Top Song': 'FavoriteTrack',
  Notes: 'Review', Comment: 'Review', Comments: 'Review', Thoughts: 'Review', Description: 'Review',
  Mood: 'MoodTag', Vibe: 'MoodTag',
  'Last Listened To...': 'DateAssigned', 'Date Listened': 'DateAssigned', 'Listen Date': 'DateAssigned', 'Date': 'DateAssigned',
  'Date Assigned': 'DateAssigned', 'Assigned Date': 'DateAssigned', 'Day': 'DateAssigned', 'Listened': 'DateAssigned', 'Listened On': 'DateAssigned',
  'Album Link': 'AlbumLink', Link: 'AlbumLink', URL: 'AlbumLink', Spotify: 'AlbumLink',
  'Top Songs': 'TopSongs', 'Top Tracks': 'TopSongs',
  'Release Year': 'Year', 'Released': 'Year',
  'Best Song(s)': 'FavoriteTrack', 'Best Songs': 'FavoriteTrack', 'Best Song': 'FavoriteTrack',
  'Worst Song(s)': 'WorstSong', 'Worst Songs': 'WorstSong', 'Worst Song': 'WorstSong',
  'Would Replay': 'WouldReplay', 'Replay': 'WouldReplay',
};
function canonicalHeader(h) { return COL_ALIASES[h] || h; }

async function getAllAlbums() {
  const rows = await sheetsGet('Ranked albums!A:Z');
  if (rows.length < 2) return [];
  const headers = rows[0];
  const artColIdx = 9; // Column J (hardcoded)
  return rows.slice(1).map((row, idx) => {
    const obj = { rowIndex: idx+2 };
    // Trim every cell on the way in. Without this, a stray trailing/leading space in a sheet
    // cell (very easy to pick up from copy/paste) makes this row's obj.Artist/obj.AlbumTitle
    // differ — by whitespace alone — from the value every other render/lookup site uses to build
    // its art-cache key (they all read obj.Artist/obj.AlbumTitle raw). That silent mismatch is
    // what was causing already-saved cover art to never display: the cache key built here
    // wouldn't match the cache key built when the card renders, so it permanently fell back to
    // "no art" for that row. Trimming once at the source keeps every downstream key consistent.
    headers.forEach((h,i) => { const canon=canonicalHeader(h); const val=(row[i]||'').trim(); if(!obj[canon] && val) obj[canon]=val; });
    // Seed art cache from sheet column if present and not already cached
    if (artColIdx >= 0) {
      const artUrl = row[artColIdx] || '';
      obj._artUrl = artUrl; // raw column J value — used by quick-fetch mode to skip albums that already have art
      // Use the exact same title-cleaning (cleanTitle strips ALL asterisks, not just a trailing
      // one) that every render site uses when building its own cache key, so this seed key always
      // matches.
      const title = cleanTitle(obj.AlbumTitle);
      const artist = (obj.Artist||'').trim();
      if (artUrl && title && artist) {
        const key = `${title}|${artist}`;
        // Sheet value takes priority — always overwrite so bad cached URLs get replaced.
        // Upgrade any stored iTunes 100×100 thumbnails to 600×600 in memory.
        _artCache[key] = _itunesHiRes(artUrl); persistArtUrl(key, _itunesHiRes(artUrl));
      }
    }
    return obj;
  });
}

async function getDailyAlbum() {
  const rows = await sheetsGet('Ranked albums!A:Z');
  if (rows.length < 2) return { error:'No albums found in sheet' };
  const headers = rows[0];
  const canonHeaders = headers.map(canonicalHeader);
  const gc = (n) => canonHeaders.indexOf(n);
  const statusCol=gc('Status'), albumIdCol=gc('AlbumID'), titleCol=gc('AlbumTitle'),
        artistCol=gc('Artist'), yearCol=gc('Year'), genreCol=gc('Genre'),
        topSongsCol=gc('TopSongs'), albumLinkCol=gc('AlbumLink'), dateCol=gc('DateAssigned');
  const todayStr = today();

  const todayRow = rows.slice(1).reduce((found,row,idx) => {
    if (found) return found;
    if ((row[dateCol]||'').trim() === todayStr) return { row, rowIndex: idx+2 };
    return null;
  }, null);

  if (todayRow) {
    const {row,rowIndex} = todayRow;
    return { album:{ date:todayStr, album_id:row[albumIdCol]||`row-${rowIndex}`, album_title:row[titleCol]||'Unknown', artist:row[artistCol]||'Unknown', year:row[yearCol]||'', genre:row[genreCol]||'', top_songs:row[topSongsCol]||'', album_link:row[albumLinkCol]||'', row_index:rowIndex, status:row[statusCol]||'' }, alreadyAssigned:true };
  }

  const candidates = rows.slice(1).map((row,idx)=>({row,rowIndex:idx+2})).filter(({row})=>(row[statusCol]||'').trim()==='Not Picked');
  if (!candidates.length) return { noCandidates:true };

  const {row,rowIndex} = candidates[Math.floor(Math.random()*candidates.length)];
  const updates = [];
  if (statusCol>=0) updates.push({ range:`Ranked albums!${colLetter(statusCol)}${rowIndex}`, values:[['Assigned']] });
  if (dateCol>=0) updates.push({ range:`Ranked albums!${colLetter(dateCol)}${rowIndex}`, values:[[todayStr]] });
  if (updates.length) await sheetsBatchUpdate(updates);

  return { album:{ date:todayStr, album_id:row[albumIdCol]||`row-${rowIndex}`, album_title:row[titleCol]||'Unknown', artist:row[artistCol]||'Unknown', year:row[yearCol]||'', genre:row[genreCol]||'', top_songs:row[topSongsCol]||'', album_link:row[albumLinkCol]||'', row_index:rowIndex, status:'Assigned' } };
}

async function updateAlbum(rowIndex, fields) {
  const rows = await sheetsGet('Ranked albums!A1:Z1');
  const headers = (rows[0]||[]);
  const updates = Object.entries(fields).map(([k,v]) => {
    // Canonical match first (same precedence getAllAlbums() uses for reads) so this always
    // writes to the same column the rest of the app reads from, even if a sheet happens to have
    // a stray duplicate/alias header further down the row. Falls back to a literal header-text
    // match only if nothing canonicalizes to this field name.
    let idx = headers.findIndex(h => canonicalHeader(h) === k);
    if (idx<0) idx = headers.indexOf(k);
    if (idx<0) return null;
    return { range:`Ranked albums!${colLetter(idx)}${rowIndex}`, values:[[v]] };
  }).filter(Boolean);
  if (updates.length) await sheetsBatchUpdate(updates);
}

async function addAlbum(album) {
  const rows = await sheetsGet('Ranked albums!A1:Z1');
  const headers = (rows[0]||[]);
  const rowData = headers.map(h => {
    const canonical = canonicalHeader(h);
    if (canonical==='Status') return 'Not Picked';
    if (canonical==='PickedByMe') return 'TRUE';
    return album[canonical]!==undefined ? String(album[canonical]) : '';
  });
  await sheetsAppend('Ranked albums!A:Z', [rowData]);
}

async function setupSheet() {
  const rows = await sheetsGet('Ranked albums!A:Z');
  if (!rows.length) throw new Error('Sheet is empty');
  let headers = rows[0];
  const requiredFields = ['AlbumID','PickedByMe','TopSongs','AlbumLink','DateAssigned','Status','WouldReplay','AlbumTitle','Artist','Year','Genre','Rating','FavoriteTrack','Review','MoodTag'];
  const norm = (h) => h.trim().toLowerCase().replace(/[\s_\-\/]+/g,'');
  const colMap = {};
  const aliasMap = { albumtitle:['title','album','albumname','name'], artist:['artistname','band','performer'], year:['releaseyear','yr','released'], genre:['style','genres'], rating:['score','ranking','rank','grade','stars'], favoritetrack:['favtrack','favoritesong','topsong','toptracks','toptrack','bestsong','favsong'], review:['notes','note','comment','comments','thoughts','description'], moodtag:['mood','vibe','feel'] };
  headers.forEach((h,i) => {
    const n = norm(h);
    for (const [canonical, aliases] of Object.entries(aliasMap)) {
      if (n===canonical || aliases.includes(n)) { const key=canonical.charAt(0).toUpperCase()+canonical.slice(1).replace('tag','Tag').replace('track','Track').replace('title','Title'); colMap[key]=i; }
    }
    if (n==='albumid') colMap.AlbumID=i;
    if (n==='pickedbyme') colMap.PickedByMe=i;
    if (n==='topsongs') colMap.TopSongs=i;
    if (n==='albumlink') colMap.AlbumLink=i;
    if (n==='dateassigned') colMap.DateAssigned=i;
    if (n==='status') colMap.Status=i;
    if (n==='wouldreplay') colMap.WouldReplay=i;
  });
  let currentCol = headers.length;
  const batchData = [];
  for (const field of requiredFields) {
    if (colMap[field]===undefined) { batchData.push({ range:`Ranked albums!${colLetter(currentCol)}1`, values:[[field]] }); colMap[field]=currentCol; currentCol++; }
  }
  rows.slice(1).forEach((row,i) => {
    const rowIndex = i+2;
    if (colMap.AlbumID!==undefined && !(row[colMap.AlbumID]||'').trim()) batchData.push({ range:`Ranked albums!${colLetter(colMap.AlbumID)}${rowIndex}`, values:[[`ALB-${rowIndex}`]] });
    if (colMap.PickedByMe!==undefined && !(row[colMap.PickedByMe]||'').trim()) batchData.push({ range:`Ranked albums!${colLetter(colMap.PickedByMe)}${rowIndex}`, values:[['TRUE']] });
    if (colMap.Status!==undefined && !(row[colMap.Status]||'').trim()) { const r=(row[colMap.Rating]||'').trim(); batchData.push({ range:`Ranked albums!${colLetter(colMap.Status)}${rowIndex}`, values:[[r?'Completed':'Not Picked']] }); }
  });
  const BATCH = 500;
  for (let i=0;i<batchData.length;i+=BATCH) await sheetsBatchUpdate(batchData.slice(i,i+BATCH));
}

// Escapes a string for safe embedding inside a single-quoted JS string literal within an
// onclick="..." HTML attribute (the attribute itself is double-quoted, so the plain esc() helpers
// elsewhere — which only escape " as &quot; — aren't enough here). Without this, an apostrophe in
// an album title or artist name (e.g. "Who's Next", "Cosmo's Factory") terminates the JS string
// literal early and breaks the handler, which silently no-ops the button when clicked. Only needed
// at onclick call sites that interpolate title/artist as single-quoted JS args (e.g. showCardMenu).
function escJsAttr(s) {
  return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

async function saveEditAlbum() {
  const a = window._editAlbum;
  if (!a?.rowIndex) { alert('No album selected'); return; }
  const status = document.getElementById('em-status');
  status.textContent = 'Saving…'; status.className = 'text-xs text-center text-gray-400';
  status.classList.remove('hidden');
  const oldRating = Number(a.Rating) || 0;
  const vals = {
    AlbumTitle: (document.getElementById('em-title').value.trim() + (needsRelisten(a.AlbumTitle)?'*':'')),
    Artist:     document.getElementById('em-artist').value.trim(),
    Year:       document.getElementById('em-year').value.trim(),
    Rating:     document.getElementById('em-rating').value.trim(),
    Genre:      document.getElementById('em-genre').value,
    FavoriteTrack: document.getElementById('em-track').value.trim(),
    Review:     document.getElementById('em-review').value.trim(),
    WouldReplay: document.getElementById('em-replay').value,
  };
  const newRating = Number(vals.Rating) || 0;
  try {
    const rows = await sheetsGet('Ranked albums!A1:Z1');
    const headers = rows[0] || [];
    const updates = Object.entries(vals).map(([key, val]) => {
      const idx = headers.findIndex(h => canonicalHeader(h) === key);
      if (idx < 0) return null;
      return { range:`Ranked albums!${colLetter(idx)}${a.rowIndex}`, values:[[val]] };
    }).filter(Boolean);
    await sheetsBatchUpdate(updates);
    // Patch in-memory
    const albums = window._libraryAlbums || [];
    const found = albums.find(al => al.rowIndex === a.rowIndex);
    if (found) Object.assign(found, vals);

    // If rating changed, reposition the album within the new rating group
    if (newRating && oldRating && newRating !== oldRating) {
      const peers = albums.filter(al => Number(al.Rating) === newRating && al.rowIndex !== a.rowIndex);
      let targetRowIndex = null;
      if (peers.length) {
        if (newRating < oldRating) {
          // Downgraded → top of new rating group (best-ranked among peers)
          targetRowIndex = Math.min(...peers.map(al => al.rowIndex));
        } else {
          // Upgraded → bottom of new rating group (worst-ranked among peers) + 1
          targetRowIndex = Math.max(...peers.map(al => al.rowIndex)) + 1;
        }
      }
      if (targetRowIndex !== null && targetRowIndex !== a.rowIndex) {
        status.textContent = 'Repositioning…';
        await moveSheetRowTo('Ranked albums', a.rowIndex, targetRowIndex);
        // Update in-memory rowIndex values for all affected albums
        const movingDown = targetRowIndex > a.rowIndex;
        const oldIdx = a.rowIndex;
        albums.forEach(al => {
          if (al.rowIndex === oldIdx) {
            al.rowIndex = movingDown ? targetRowIndex - 1 : targetRowIndex;
          } else if (movingDown && al.rowIndex > oldIdx && al.rowIndex < targetRowIndex) {
            al.rowIndex--;
          } else if (!movingDown && al.rowIndex >= targetRowIndex && al.rowIndex < oldIdx) {
            al.rowIndex++;
          }
        });
        albums.sort((x, y) => x.rowIndex - y.rowIndex);
      }
    }

    status.textContent = '✓ Saved!'; status.className = 'text-xs text-center text-green-400';
    setTimeout(() => { closeEditModal(); if (S.route==='library') filterLibrary(); else render(); }, 800);
  } catch(e) { status.textContent = '✗ ' + e.message; status.className = 'text-xs text-center text-red-400'; }
}

async function getSheetId(sheetName) {

}

    { method:'POST', headers:{ Authorization:`Bearer ${S.token}`, 'Content-Type':'application/json' },

}

// Swaps a single data row with its immediate neighbor by moving it one position up/down in the
// actual sheet (preserves every column + any formatting — not a cell-by-cell value copy, which
// would risk dropping columns this app doesn't know about). rowIndex is 1-based (row 2 = first
// data row, since row 1 is the header).
//
// Google's moveDimension destinationIndex is computed against the sheet BEFORE the source row is
// removed. For a single-row move (source = [i, i+1)):
//   - moving up by one (swap with i-1):   destinationIndex = i - 1
//   - moving down by one (swap with i+1): destinationIndex = i + 2
// (Verified against Google's own example: array [0,1,2,3,4], source=[1,3), destination=4 → result
// [0,3,1,2,4] — i.e. destinationIndex is measured in the original, pre-removal index space.)
async function moveSheetRow(sheetName, rowIndex, direction) {
  const sheetId = await getSheetId(sheetName);
  if (sheetId === null) throw new Error(sheetName + ' sheet not found');
  const i = rowIndex - 1; // 0-based index of this row
  if (direction === 'up' && i <= 1) return; // already the first data row — never move above the header
  const destinationIndex = direction === 'up' ? i - 1 : i + 2;
  const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${S.sheetId}:batchUpdate`,
    { method:'POST', headers:{ Authorization:`Bearer ${S.token}`, 'Content-Type':'application/json' },
      body: JSON.stringify({ requests:[{ moveDimension:{
        source: { sheetId, dimension:'ROWS', startIndex:i, endIndex:i+1 },
        destinationIndex
      } }] }) });
  if (!r.ok) { const t=await r.text(); throw new Error(`Move error: ${t}`); }
}

async function moveLibraryRow(rowIndex, direction) {
  try {
    await moveSheetRow('Ranked albums', rowIndex, direction);
    // Swap rowIndex values in-memory — no full page reload needed
    const albums = window._libraryAlbums || [];
    const idx = albums.findIndex(a => a.rowIndex === rowIndex);
    const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
    if (idx >= 0 && swapIdx >= 0 && swapIdx < albums.length) {
      const tmp = albums[idx].rowIndex;
      albums[idx].rowIndex = albums[swapIdx].rowIndex;
      albums[swapIdx].rowIndex = tmp;
      albums.sort((a, b) => a.rowIndex - b.rowIndex);
    }
    filterLibrary();
  } catch(e) { alert('Error reordering: ' + e.message); }
}

// Jumps a row directly to an arbitrary target row in one API call, instead of clicking ▲▼
// repeatedly. targetRowIndex is 1-based, same convention as rowIndex (row 2 = first data row).
// Generalizes the same moveDimension math used for single-step moves above:
//   - moving up   (targetRowIndex < rowIndex): destinationIndex = targetRowIndex - 1
//   - moving down (targetRowIndex > rowIndex): destinationIndex = targetRowIndex
// (Single-step up/down are just this formula with targetRowIndex = rowIndex∓1 — same source range,
// same destinationIndex shape, just generalized from a fixed ±1 to an arbitrary distance.)
async function moveSheetRowTo(sheetName, rowIndex, targetRowIndex) {
  if (targetRowIndex === rowIndex) return;
  const sheetId = await getSheetId(sheetName);
  if (sheetId === null) throw new Error(sheetName + ' sheet not found');
  const i = rowIndex - 1;
  const destinationIndex = targetRowIndex < rowIndex ? targetRowIndex - 1 : targetRowIndex;
  const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${S.sheetId}:batchUpdate`,
    { method:'POST', headers:{ Authorization:`Bearer ${S.token}`, 'Content-Type':'application/json' },
      body: JSON.stringify({ requests:[{ moveDimension:{
        source: { sheetId, dimension:'ROWS', startIndex:i, endIndex:i+1 },
        destinationIndex
      } }] }) });
  if (!r.ok) { const t=await r.text(); throw new Error(`Move error: ${t}`); }
}

// ─── RATE-LIMITED FETCH (iTunes + Deezer) ────────────────────────────────────
// Live network logs during a real bulk-fetch run showed nearly every iTunes AND
// Deezer request coming back 503 Service Unavailable after the first couple
// dozen calls. Apple documents the iTunes Search API at ~20 calls/minute —
// the old code could fire a dozen+ simultaneous requests every few hundred ms
// (bulk fetcher's parallel chunks, PLUS the lazy art loader firing one fetch
// per missing album on every page render), which blows past that instantly.
// These two helpers funnel EVERY call to each API through a single queue with
// a minimum gap between requests, and retry once or twice on 503/429/network
// failure before giving up. This is pure I/O pacing — no matching logic here.
async function _fetchWithRetry(url, retries) {
  retries = retries == null ? 2 : retries;
  for (let attempt = 0; attempt <= retries; attempt++) {
    try {
      const resp = await fetch(url);
      if ((resp.status === 503 || resp.status === 429) && attempt < retries) {
        await new Promise(r => setTimeout(r, 1500 * (attempt + 1)));
        continue;
      }
      return resp;
    } catch (e) {
      if (attempt < retries) { await new Promise(r => setTimeout(r, 1500 * (attempt + 1))); continue; }
      throw e;
    }
  }
}
let _itunesChain = Promise.resolve();
function fetchItunes(url) {
  const task = _itunesChain.then(() => _fetchWithRetry(url));
  _itunesChain = task.catch(() => {}).then(() => new Promise(r => setTimeout(r, 3200)));
  return task;
}
let _deezerChain = Promise.resolve();
function fetchDeezer(url) {
  const task = _deezerChain.then(() => _fetchWithRetry(url));
  _deezerChain = task.catch(() => {}).then(() => new Promise(r => setTimeout(r, 700)));
  return task;
}

// ─── SHARED ART HELPERS ──────────────────────────────────────────────────────
// Strips stray formatting junk (asterisks, curly quotes, doubled whitespace) from the title/artist
// BEFORE it's used to build the literal search query sent to iTunes/Deezer. This only cleans up
// what gets typed into the search box — it never touches _artNorm/_artTitleScore/_artArtistScore,
// so how a returned result is scored and matched is completely unchanged.
const _artQueryClean = s => (s||'').replace(/\*+/g, '').replace(/[‘’]/g, "'").replace(/[“”]/g, '"').replace(/\s+/g, ' ').trim();
const _artNorm = s => (s||'')
  .normalize('NFKD').replace(/[̀-ͯ]/g,'') // ö→o, é→e, ü→u, etc.
  .toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
const _artStops = new Set(['the','a','an','and','or','of','in','is','to','da','el','les','de']);
// First significant word — skips stop words so "The Notorious B.I.G." → "notorious"
const _artFirstSig = nal => nal.split(' ').find(w => w.length > 2 && !_artStops.has(w)) || nal.split(' ')[0];
const _artSigWords = s => s.split(' ').filter(w => w.length > 2 && !_artStops.has(w));
const _artOverlap = (a, b) => {
  const aw = _artSigWords(a); if (!aw.length) return 0;
  const bSet = new Set(_artSigWords(b));
  return aw.filter(w => bSet.has(w)).length / aw.length;
};
const _artTitleScore = (ntl, rt) => {
  if (rt === ntl) return 10;
  const ov = _artOverlap(ntl, rt);
  if (ov >= 0.8) return 8;
  if (ov >= 0.6) return 5;
  if (rt.includes(ntl) || ntl.includes(rt)) return 5;
  return 0;
};
const _artArtistScore = (nal, ra) => {
  if (ra === nal) return 4;
  const fw = _artFirstSig(nal);
  const raWords = new Set(ra.split(' '));
  const nalWords = new Set(nal.split(' '));
  // Whole-word match only — prevents "mac" matching "macabre", "notorious" matching "notoriously" etc.
  if (fw.length > 2 && raWords.has(fw)) return 2;
  const rfw = _artFirstSig(ra);
  if (rfw.length > 2 && nalWords.has(rfw)) return 2;
  return 0;
};

// ─── ITUNES ART FETCH ────────────────────────────────────────────────────────
// iTunes CDN supports any resolution — just swap the dimension segment in the URL.
// artworkUrl100 = 100×100 thumbnail; 600×600 is the standard hi-res album cover size.
function _itunesHiRes(url) {
  if (!url) return url;
  return url.replace(/\d+x\d+bb/, '600x600bb');
}

async function fetchArtFromItunes(title, artist) {
  try {
    title = _artQueryClean(title);
    artist = _artQueryClean(artist);
    const ntl = _artNorm(title);
    const nal = _artNorm(artist);
    const fw = _artFirstSig(nal);

    // Require BOTH conditions independently — prevents "exact title, wrong artist" false matches
    const findBest = (results) => {
      const scored = results.map(r => {
        const ts = _artTitleScore(ntl, _artNorm(r.collectionName||''));
        const as = _artArtistScore(nal, _artNorm(r.artistName||''));
        return { r, ts, as, total: ts + as };
      }).filter(x => x.ts >= 8 && x.as >= 2); // strong title AND artist correlation, both required
      if (!scored.length) return null;
      return scored.sort((a, b) => b.total - a.total)[0].r;
    };

    const trySearch = async (q) => {
      const resp = await fetchItunes(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&media=music&entity=album&limit=10`);
      if (!resp.ok) return [];
      return (await resp.json()).results || [];
    };

    // Pass 1: "Artist Title"
    let match = findBest(await trySearch(`${artist} ${title}`));
    // Pass 2: title only
    if (!match) match = findBest(await trySearch(title));
    // Pass 3: first significant word of artist + title
    if (!match && fw.length > 2) match = findBest(await trySearch(`${fw} ${title}`));
    // Pass 4: strip leading article from title
    const stripped = title.replace(/^(the|a|an)\s+/i, '').trim();
    if (!match && stripped !== title) match = findBest(await trySearch(`${artist} ${stripped}`));

    if (!match) return null;
    return _itunesHiRes(match.artworkUrl100 || match.artworkUrl60) || null;
  } catch(e) { return null; }
}

// ─── DEEZER ART FETCH (fallback) ─────────────────────────────────────────────
async function fetchArtFromDeezer(title, artist) {
  try {
    title = _artQueryClean(title);
    artist = _artQueryClean(artist);
    const ntl = _artNorm(title);
    const nal = _artNorm(artist);
    const resp = await fetchDeezer(`https://api.deezer.com/search/album?q=${encodeURIComponent(artist + ' ' + title)}&limit=10`);
    if (!resp.ok) return null;
    const data = await resp.json();
    if (!data.data?.length) return null;
    for (const album of data.data) {
      const rt = _artNorm(album.title||'');
      const ra = _artNorm(album.artist?.name||'');
      const ts = _artTitleScore(ntl, rt);
      const as = _artArtistScore(nal, ra);
      // Same dual requirement: strong title (≥8) AND artist correlation (≥2)
      if (ts >= 8 && as >= 2) return album.cover_xl || album.cover_big || album.cover_medium || null;
    }
    return null;
  } catch(e) { return null; }
}

// ─── WIKIPEDIA ART FETCH (built-in 3rd fallback) ─────────────────────────────
// Catches the deep cuts, mixtapes, and older/regional releases that iTunes and
// Deezer's catalogs don't carry, without requiring anyone to do a manual
// browse-and-paste lookup — same idea as the ⋮ "search for art" helper below,
// just automated and run as part of the normal bulk-fetch passes so every user
// of this app benefits, not just whoever happens to be doing it by hand.
// Wikipedia's plain search API finds the page; the REST summary endpoint's
// originalimage/thumbnail is what actually surfaces the lead image, INCLUDING
// non-free cover art — the older Action API's prop=pageimages endpoint omits
// non-free files entirely, which is most album covers, so it's deliberately
// not used here. Confidence is checked against the page's own free-text
// description (does it read as an album/EP/mixtape, does the artist's name
// show up in it) — that's a different kind of check than _artNorm/
// _artTitleScore/_artArtistScore (which assume structured title/artist
// fields), so it's kept fully separate. iTunes/Deezer matching is untouched.
let _wikiChain = Promise.resolve();
function fetchWiki(url) {
  const task = _wikiChain.then(() => _fetchWithRetry(url));
  _wikiChain = task.catch(() => {}).then(() => new Promise(r => setTimeout(r, 400)));
  return task;
}
const _wikiStops = new Set(['and','the','with','feat','featuring','of','a','vs','x']);
const _wikiLooksLikeAlbum = desc => /\balbum\b|\bep\b|\bmixtape\b|extended play|\brecord\b/i.test(desc||'');
const _wikiArtistMatch = (artist, desc) => {
  const d = (desc||'').toLowerCase();
  const words = _artNorm(artist).split(' ').filter(w => w.length > 2 && !_wikiStops.has(w));
  if (!words.length) return false;
  return words.some(w => d.includes(w));
};
async function fetchArtFromWikipedia(title, artist) {
  try {
    title = _artQueryClean(title);
    artist = _artQueryClean(artist);
    const sResp = await fetchWiki(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(artist + ' ' + title + ' album')}&format=json&srlimit=1&origin=*`);
    if (!sResp.ok) return null;
    const sData = await sResp.json();
    const pageTitle = sData.query?.search?.[0]?.title;
    if (!pageTitle) return null;
    const rResp = await fetchWiki(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(pageTitle)}`);
    if (!rResp.ok) return null;
    const rData = await rResp.json();
    const desc = `${rData.description||''} ${rData.extract||''}`;
    if (!_wikiLooksLikeAlbum(desc)) return null;
    if (!_wikiArtistMatch(artist, desc)) return null;
    return rData.originalimage?.source || rData.thumbnail?.source || null;
  } catch(e) { return null; }
}

// ─── COVER ART ARCHIVE ART FETCH (built-in 4th fallback) ─────────────────────
// MusicBrainz has the broadest catalog of any open music database — indie, underground,
// international, self-released, everything — and the Cover Art Archive sits on top of it
// specifically for cover images. No API key required. CORS-open.
// Flow: MusicBrainz release search → best-confidence release ID → CAA front image URL.
// Confidence check: require the recording artist to appear in the credited-artist field
// of the top result (MusicBrainz returns structured data so we can compare directly,
// not just look at free text like the Wikipedia pass does).
let _mbChain = Promise.resolve();
function fetchMB(url) {
  const task = _mbChain.then(() => _fetchWithRetry(url));
  // MusicBrainz asks for ≥1s between requests in their API guidelines
  _mbChain = task.catch(() => {}).then(() => new Promise(r => setTimeout(r, 1100)));
  return task;
}
async function fetchArtFromCoverArtArchive(title, artist) {
  try {
    title = _artQueryClean(title);
    artist = _artQueryClean(artist);
    const ntl = _artNorm(title);
    const nal = _artNorm(artist);
    // MusicBrainz release search — returns JSON with release list + artist credits
    const sResp = await fetchMB(
      `https://musicbrainz.org/ws/2/release/?query=release:${encodeURIComponent(title)}+artist:${encodeURIComponent(artist)}&fmt=json&limit=5`
    );
    if (!sResp.ok) return null;
    const sData = await sResp.json();
    const releases = sData.releases || [];
    if (!releases.length) return null;
    // Pick the highest-scored release whose artist name has reasonable overlap
    let mbid = null;
    for (const rel of releases) {
      const relTitle = _artNorm(rel.title || '');
      const relArtist = _artNorm(
        (rel['artist-credit'] || []).map(c => c.artist?.name || c.name || '').join(' ')
      );
      const ts = _artTitleScore(ntl, relTitle);
      const as = _artArtistScore(nal, relArtist);
      if (ts >= 5 && as >= 2) { mbid = rel.id; break; }
    }
    if (!mbid) return null;
    // Cover Art Archive: /release/{mbid}/front redirects to the actual image (404 if none)
    const imgResp = await fetchMB(`https://coverartarchive.org/release/${mbid}/front`);
    if (!imgResp.ok) return null;
    // The redirect lands on the real image URL — return it directly
    return imgResp.url || null;
  } catch(e) { return null; }
}

// ─── BULK ART FETCHER ────────────────────────────────────────────────────────
async function bulkFetchArt(quickMode) {
  const modal = document.getElementById('bulk-art-modal');
  const statusEl = document.getElementById('bulk-art-status');
  const barEl = document.getElementById('bulk-art-bar');
  const countEl = document.getElementById('bulk-art-count');
  const closeBtn = document.getElementById('bulk-art-close');
  modal.classList.remove('hidden');
  closeBtn.classList.add('hidden');
  barEl.style.width = '0%';
  statusEl.textContent = 'Loading albums from sheet…';
  countEl.textContent = '';

  _bulkFetchActive = true; // suppress the lazy art loader's competing Deezer calls for the duration
  try {
    // Quick mode (only fetch albums currently missing art) deliberately skips the cache
    // wipe below and the "has art?" filter uses the sheet's own column J value, not the
    // matching logic — so this never touches how a match is scored, only which albums
    // get looked at at all.
    if (!quickMode) {
      // 1. Clear stale local cache so old bad URLs don't interfere
      try { localStorage.removeItem(ART_LS_KEY); } catch(e) {}
      for (const k of Object.keys(_artCache)) delete _artCache[k];
    }

    // 2. Get all albums (getAllAlbums re-seeds _artCache from the old sheet — clear it again
    //    immediately so stale wrong URLs don't survive into the UI after this fetch)
    const allAlbums = await getAllAlbums();
    if (!quickMode) {
      try { localStorage.removeItem(ART_LS_KEY); } catch(e) {}
      for (const k of Object.keys(_artCache)) delete _artCache[k];
    }

    // 3. All albums with title + artist — in quick mode, only ones still missing art
    const missing = allAlbums.filter(a => {
      const title = (a.AlbumTitle||'').replace(/\*$/,'').trim();
      const artist = (a.Artist||'').trim();
      if (!title || !artist) return false;
      if (quickMode && a._artUrl) return false; // already has art in the sheet — skip
      return true;
    });

    if (!missing.length) {
      statusEl.textContent = '✅ No albums to fetch art for!';
      barEl.style.width = '100%';
      closeBtn.classList.remove('hidden');
      return;
    }

    // NOTE: we deliberately do NOT blank column J upfront anymore. Clearing everything
    // before any replacement is written meant a single hiccup partway through (expired
    // auth token, network blip, rate limit) left every album with NO art at all — that's
    // what was wiping out previously-correct covers. Now old values are only ever
    // overwritten once we have a confirmed new URL in hand, and we save each pass's
    // results to the sheet immediately rather than waiting until the very end, so a
    // failure in a later pass can never undo a successful earlier one.

    statusEl.textContent = `iTunes pass: fetching art for ${missing.length} albums…`;
    countEl.textContent = `0 / ${missing.length}`;

    // 4. iTunes — parallel chunks of 3 with 500ms delay (avoids rate limiting)
    const CHUNK = 3;
    const found = [];
    let checked = 0;
    let itunesFound = [];

    for (let i = 0; i < missing.length; i += CHUNK) {
      const chunk = missing.slice(i, i + CHUNK);
      const results = await Promise.all(chunk.map(async a => {
        const title = (a.AlbumTitle||'').replace(/\*$/,'').trim();
        const artist = (a.Artist||'').trim();
        const url = await fetchArtFromItunes(title, artist);
        return { a, title, artist, url };
      }));
      for (const { a, title, artist, url } of results) {
        if (url) {
          const key = `${title}|${artist}`;
          _artCache[key] = url;
          persistArtUrl(key, url);
          itunesFound.push({ range: `Ranked albums!J${a.rowIndex}`, values: [[url]] });
        }
      }
      checked += chunk.length;
      barEl.style.width = Math.round((checked / missing.length) * 40) + '%'; // iTunes = first 40%
      countEl.textContent = `iTunes: ${checked}/${missing.length} checked · ${itunesFound.length} found`;
      if (i + CHUNK < missing.length) await new Promise(r => setTimeout(r, 500));
    }

    // Save iTunes matches now — they're safe even if a later pass fails.
    if (itunesFound.length) {
      statusEl.textContent = `Saving ${itunesFound.length} iTunes matches…`;
      await sheetsBatchUpdate(itunesFound);
      found.push(...itunesFound);
    }

    // 5. Deezer fallback for albums iTunes missed (parallel chunks of 4, no rate limit)
    const notFound = missing.filter(a => {
      const title = (a.AlbumTitle||'').replace(/\*$/,'').trim();
      const artist = (a.Artist||'').trim();
      return !_artCache[`${title}|${artist}`];
    });
    if (notFound.length) {
      statusEl.textContent = `iTunes: ${found.length} found. Deezer pass for ${notFound.length} remaining…`;
      const D_CHUNK = 4;
      let dchecked = 0;
      const dFound = [];
      for (let i = 0; i < notFound.length; i += D_CHUNK) {
        const chunk = notFound.slice(i, i + D_CHUNK);
        const dResults = await Promise.all(chunk.map(async a => {
          const title = (a.AlbumTitle||'').replace(/\*$/,'').trim();
          const artist = (a.Artist||'').trim();
          const url = await fetchArtFromDeezer(title, artist);
          return { a, title, artist, url };
        }));
        for (const { a, title, artist, url } of dResults) {
          if (url) {
            const key = `${title}|${artist}`;
            _artCache[key] = url;
            persistArtUrl(key, url);
            dFound.push({ range: `Ranked albums!J${a.rowIndex}`, values: [[url]] });
          }
        }
        dchecked += chunk.length;
        barEl.style.width = (40 + Math.round((dchecked / notFound.length) * 30)) + '%';
        countEl.textContent = `Deezer: ${dchecked}/${notFound.length} · total found: ${found.length + dFound.length}`;
        if (i + D_CHUNK < notFound.length) await new Promise(r => setTimeout(r, 300));
      }
      // Save Deezer matches now, independent of the iTunes save above.
      if (dFound.length) {
        statusEl.textContent = `Saving ${dFound.length} Deezer matches…`;
        await sheetsBatchUpdate(dFound);
        found.push(...dFound);
      }
    }

    // 6. iTunes artist-lookup pass — group remaining misses by artist, get full discography
    const stillMissing = missing.filter(a => {
      const title = (a.AlbumTitle||'').replace(/\*$/,'').trim();
      const artist = (a.Artist||'').trim();
      return !_artCache[`${title}|${artist}`];
    });
    if (stillMissing.length) {
      // Group by artist
      const byArtist = {};
      for (const a of stillMissing) {
        const artist = (a.Artist||'').trim();
        if (!byArtist[artist]) byArtist[artist] = [];
        byArtist[artist].push(a);
      }
      const artists = Object.keys(byArtist);
      statusEl.textContent = `Artist lookup: checking ${artists.length} artists on iTunes…`;
      let adone = 0;
      const aFound = [];
      for (const artist of artists) {
        adone++;
        countEl.textContent = `Artist ${adone}/${artists.length}: ${artist} · found: ${found.length}`;
        try {
          // Step 1: find artist ID
          const sResp = await fetchItunes(`https://itunes.apple.com/search?term=${encodeURIComponent(_artQueryClean(artist))}&media=music&entity=musicArtist&limit=3`);
          if (!sResp.ok) { await new Promise(r=>setTimeout(r,400)); continue; }
          const sData = await sResp.json();
          if (!sData.results?.length) { await new Promise(r=>setTimeout(r,400)); continue; }
          const nal = _artNorm(artist);
          // Only use exact artist name match — never fall back to results[0] (wrong artist)
          const aResult = sData.results.find(r => _artNorm(r.artistName||'') === nal);
          const artistId = aResult?.artistId;
          if (!artistId) { await new Promise(r=>setTimeout(r,400)); continue; }
          await new Promise(r=>setTimeout(r,350));
          // Step 2: get all their albums (up to 200)
          const lResp = await fetchItunes(`https://itunes.apple.com/lookup?id=${artistId}&entity=album&limit=200`);
          if (!lResp.ok) { await new Promise(r=>setTimeout(r,400)); continue; }
          const lData = await lResp.json();
          const catalog = (lData.results||[]).filter(r => r.wrapperType === 'collection');
          if (!catalog.length) { await new Promise(r=>setTimeout(r,350)); continue; }
          // Step 3: match each album from the miss list against the artist's full catalog
          for (const a of byArtist[artist]) {
            const title = (a.AlbumTitle||'').replace(/\*$/,'').trim();
            const ntl = _artNorm(title);
            let bestMatch = null, bestScore = 0;
            for (const ci of catalog) {
              const s = _artTitleScore(ntl, _artNorm(ci.collectionName||''));
              if (s > bestScore) { bestScore = s; bestMatch = ci; }
            }
            // Artist confirmed — require 80%+ word overlap (score ≥ 8) or exact match (10)
            if (bestMatch && bestScore >= 8) {
              const url = _itunesHiRes(bestMatch.artworkUrl100 || bestMatch.artworkUrl60);
              if (url) {
                const key = `${title}|${artist}`;
                _artCache[key] = url;
                persistArtUrl(key, url);
                aFound.push({ range: `Ranked albums!J${a.rowIndex}`, values: [[url]] });
              }
            }
          }
        } catch(e) {}
        await new Promise(r=>setTimeout(r,350));
      }
      // Save artist-catalog matches now, independent of the earlier saves.
      if (aFound.length) {
        statusEl.textContent = `Saving ${aFound.length} artist-catalog matches…`;
        await sheetsBatchUpdate(aFound);
        found.push(...aFound);
      }
    }

    // 7. Wikipedia fallback (3rd fallback overall) for anything iTunes + Deezer still missed
    const stillMissing2 = missing.filter(a => {
      const title = (a.AlbumTitle||'').replace(/\*$/,'').trim();
      const artist = (a.Artist||'').trim();
      return !_artCache[`${title}|${artist}`];
    });
    if (stillMissing2.length) {
      statusEl.textContent = `Wikipedia pass: checking ${stillMissing2.length} remaining…`;
      const W_CHUNK = 2;
      let wchecked = 0;
      const wFound = [];
      for (let i = 0; i < stillMissing2.length; i += W_CHUNK) {
        const chunk = stillMissing2.slice(i, i + W_CHUNK);
        const wResults = await Promise.all(chunk.map(async a => {
          const title = (a.AlbumTitle||'').replace(/\*$/,'').trim();
          const artist = (a.Artist||'').trim();
          const url = await fetchArtFromWikipedia(title, artist);
          return { a, title, artist, url };
        }));
        for (const { a, title, artist, url } of wResults) {
          if (url) {
            const key = `${title}|${artist}`;
            _artCache[key] = url;
            persistArtUrl(key, url);
            wFound.push({ range: `Ranked albums!J${a.rowIndex}`, values: [[url]] });
          }
        }
        wchecked += chunk.length;
        barEl.style.width = (70 + Math.round((wchecked / stillMissing2.length) * 20)) + '%';
        countEl.textContent = `Wikipedia: ${wchecked}/${stillMissing2.length} · total found: ${found.length + wFound.length}`;
      }
      if (wFound.length) {
        statusEl.textContent = `Saving ${wFound.length} Wikipedia matches…`;
        await sheetsBatchUpdate(wFound);
        found.push(...wFound);
      }
    }

    // 8. Cover Art Archive fallback for anything still missing after Wikipedia
    const stillMissing3 = missing.filter(a => {
      const title = (a.AlbumTitle||'').replace(/\*$/,'').trim();
      const artist = (a.Artist||'').trim();
      return !_artCache[`${title}|${artist}`];
    });
    if (stillMissing3.length) {
      statusEl.textContent = `Cover Art Archive pass for ${stillMissing3.length} remaining…`;
      const C_CHUNK = 1; // MusicBrainz asks for serial requests; CAA piggybacks
      let cchecked = 0;
      const cFound = [];
      for (let i = 0; i < stillMissing3.length; i += C_CHUNK) {
        const chunk = stillMissing3.slice(i, i + C_CHUNK);
        const cResults = await Promise.all(chunk.map(async a => {
          const title = (a.AlbumTitle||'').replace(/\*$/,'').trim();
          const artist = (a.Artist||'').trim();
          const url = await fetchArtFromCoverArtArchive(title, artist);
          return { a, title, artist, url };
        }));
        for (const { a, title, artist, url } of cResults) {
          if (url) {
            const key = `${title}|${artist}`;
            _artCache[key] = url;
            persistArtUrl(key, url);
            cFound.push({ range: `Ranked albums!J${a.rowIndex}`, values: [[url]] });
          }
        }
        cchecked += chunk.length;
        barEl.style.width = (90 + Math.round((cchecked / stillMissing3.length) * 10)) + '%';
        countEl.textContent = `Cover Art Archive: ${cchecked}/${stillMissing3.length} · total found: ${found.length + cFound.length}`;
      }
      if (cFound.length) {
        statusEl.textContent = `Saving ${cFound.length} Cover Art Archive matches…`;
        await sheetsBatchUpdate(cFound);
        found.push(...cFound);
      }
    }

    statusEl.textContent = `✅ Done! Found art for ${found.length} of ${missing.length} albums.`;
    barEl.style.width = '100%';
    countEl.textContent = found.length < missing.length
      ? `${missing.length - found.length} album${missing.length - found.length !== 1 ? 's' : ''} not found — set those manually via ⋮`
      : 'All albums have art!';
    closeBtn.classList.remove('hidden');

  } catch(e) {
    statusEl.textContent = '❌ Error: ' + e.message;
    closeBtn.classList.remove('hidden');
  } finally {
    _bulkFetchActive = false;
    loadLazyArt(); // catch up on any art the lazy loader skipped while suppressed
  }
}

// ─── BULK ART FETCHER (QUEUE) ────────────────────────────────────────────────
// Mirrors bulkFetchArt() above but targets the Queue ("AlbumList" sheet, column C) instead of the
// Library ("Ranked albums" sheet, column J/getAllAlbums()). Reuses the exact same fetch + matching
// functions (fetchArtFromItunes/fetchArtFromDeezer/fetchArtFromWikipedia, which call into
// _artNorm/_artTitleScore/_artArtistScore) untouched — only the source list (getAlbumList) and the
// sheet range written back to (AlbumList!C{rowIndex}) differ. Skips the slower iTunes

  closeBtn.classList.add('hidden');

    statusEl.textContent = `iTunes pass: fetching art for ${missing.length} albums…`;
    countEl.textContent = `0 / ${missing.length}`;

    const CHUNK = 3;
    const found = [];
    let checked = 0;

    for (let i = 0; i < missing.length; i += CHUNK) {
      const chunk = missing.slice(i, i + CHUNK);
      const results = await Promise.all(chunk.map(async a => {
        const url = await fetchArtFromItunes(a.title, a.artist);
        return { a, url };
      }));
      for (const { a, url } of results) {
        if (url) {
          const key = `${a.title}|${a.artist}`;
          _artCache[key] = url;
          persistArtUrl(key, url);
          found.push({ range: `AlbumList!C${a.rowIndex}`, values: [[url]] });
        }
      }
      checked += chunk.length;
      barEl.style.width = Math.round((checked / missing.length) * 35) + '%'; // iTunes = first 35%
      countEl.textContent = `iTunes: ${checked}/${missing.length} checked · ${found.length} found`;
      if (i + CHUNK < missing.length) await new Promise(r => setTimeout(r, 500));

    // Deezer fallback for anything iTunes missed
    const notFound = missing.filter(a => !_artCache[`${a.title}|${a.artist}`]);
    if (notFound.length) {
      statusEl.textContent = `iTunes: ${found.length} found. Deezer pass for ${notFound.length} remaining…`;
      const D_CHUNK = 4;
      let dchecked = 0;
      const dFound = [];
      for (let i = 0; i < notFound.length; i += D_CHUNK) {
        const chunk = notFound.slice(i, i + D_CHUNK);
        const dResults = await Promise.all(chunk.map(async a => {
          const url = await fetchArtFromDeezer(a.title, a.artist);
          return { a, url };
        }));
        for (const { a, url } of dResults) {
          if (url) {
            const key = `${a.title}|${a.artist}`;
            _artCache[key] = url;
            persistArtUrl(key, url);
            dFound.push({ range: `AlbumList!C${a.rowIndex}`, values: [[url]] });
          }
        }
        dchecked += chunk.length;
        barEl.style.width = (35 + Math.round((dchecked / notFound.length) * 30)) + '%';
        countEl.textContent = `Deezer: ${dchecked}/${notFound.length} · total found: ${found.length + dFound.length}`;
        if (i + D_CHUNK < notFound.length) await new Promise(r => setTimeout(r, 300));
      }
      if (dFound.length) {
        statusEl.textContent = `Saving ${dFound.length} Deezer matches…`;
        await sheetsBatchUpdate(dFound);
        found.push(...dFound);
      }
    }

    // Wikipedia fallback for anything iTunes + Deezer still missed
    const stillMissing = missing.filter(a => !_artCache[`${a.title}|${a.artist}`]);
    if (stillMissing.length) {
      statusEl.textContent = `Wikipedia pass for ${stillMissing.length} remaining…`;
      const W_CHUNK = 2;
      let wchecked = 0;
      const wFound = [];
      for (let i = 0; i < stillMissing.length; i += W_CHUNK) {
        const chunk = stillMissing.slice(i, i + W_CHUNK);
        const wResults = await Promise.all(chunk.map(async a => {
          const url = await fetchArtFromWikipedia(a.title, a.artist);
          return { a, url };
        }));
        for (const { a, url } of wResults) {
          if (url) {
            const key = `${a.title}|${a.artist}`;
            _artCache[key] = url;
            persistArtUrl(key, url);
            wFound.push({ range: `AlbumList!C${a.rowIndex}`, values: [[url]] });
          }
        }
        wchecked += chunk.length;
        barEl.style.width = (65 + Math.round((wchecked / stillMissing.length) * 25)) + '%';
        countEl.textContent = `Wikipedia: ${wchecked}/${stillMissing.length} · total found: ${found.length + wFound.length}`;
      }
      if (wFound.length) {
        statusEl.textContent = `Saving ${wFound.length} Wikipedia matches…`;
        await sheetsBatchUpdate(wFound);
        found.push(...wFound);
      }
    }

    // Cover Art Archive fallback for anything still missing after Wikipedia
    const stillMissing2 = missing.filter(a => !_artCache[`${a.title}|${a.artist}`]);
    if (stillMissing2.length) {
      statusEl.textContent = `Cover Art Archive pass for ${stillMissing2.length} remaining…`;
      const C_CHUNK = 1;
      let cchecked = 0;
      const cFound = [];
      for (let i = 0; i < stillMissing2.length; i += C_CHUNK) {
        const chunk = stillMissing2.slice(i, i + C_CHUNK);
        const cResults = await Promise.all(chunk.map(async a => {
          const url = await fetchArtFromCoverArtArchive(a.title, a.artist);
          return { a, url };
        }));
        for (const { a, url } of cResults) {
          if (url) {
            const key = `${a.title}|${a.artist}`;
            _artCache[key] = url;
            persistArtUrl(key, url);
            cFound.push({ range: `AlbumList!C${a.rowIndex}`, values: [[url]] });
          }
        }
        cchecked += chunk.length;
        barEl.style.width = (90 + Math.round((cchecked / stillMissing2.length) * 10)) + '%';
        countEl.textContent = `Cover Art Archive: ${cchecked}/${stillMissing2.length} · total found: ${found.length + cFound.length}`;
      }
      if (cFound.length) {
        statusEl.textContent = `Saving ${cFound.length} Cover Art Archive matches…`;
        await sheetsBatchUpdate(cFound);
        found.push(...cFound);
      }
    }

    statusEl.textContent = `✅ Done! Found art for ${found.length} of ${missing.length} albums.`;
    barEl.style.width = '100%';
    countEl.textContent = found.length < missing.length
      ? `${missing.length - found.length} album${missing.length - found.length !== 1 ? 's' : ''} not found — set those manually via ⋮`
      : 'All albums have art!';
    closeBtn.classList.remove('hidden');

  } catch(e) {
    statusEl.textContent = '❌ Error: ' + e.message;
    closeBtn.classList.remove('hidden');
  } finally {
    _bulkFetchActive = false;
    loadLazyArt(); // catch up on any art the lazy loader skipped while suppressed
  }
}

// ─── LAZY ART LOADER ─────────────────────────────────────────────────────────
// Live network logs during a bulk-fetch run showed Deezer getting hammered by
// duplicate requests for the SAME albums even after the fetchDeezer() throttle
// was added. Root cause: bulkFetchArt() clears _artCache at the start (so old
// bad URLs don't linger), but the Library page underneath the modal still has
// its lazy-loader queuing one fetchAlbumArt()->Deezer call per still-missing
// album. With the cache empty, every one of those is a real network call, and
// it competes with the bulk fetcher's own later Deezer pass for the same
// throttled queue. Since the bulk fetcher is about to fetch (and save) art for
// these exact albums anyway, the lazy loader has nothing useful to do during a
// bulk run — so it's suppressed for the duration via this flag, set/cleared by
// bulkFetchArt() itself. Pure I/O contention fix, no matching logic touched.
let _bulkFetchActive = false;
function loadLazyArt() {
  if (_bulkFetchActive) return;
  document.querySelectorAll('.art-placeholder:not([data-loaded])').forEach(div => {
    div.setAttribute('data-loaded', '1');
    const title = div.getAttribute('data-title') || '';
    const artist = div.getAttribute('data-artist') || '';
    if (!title) return;
    fetchAlbumArt(title, artist).then(url => {
      if (url && div.isConnected) {
        div.innerHTML = `<img src="${url}" class="w-full h-full object-cover" style="display:block" />`;
        persistArtUrl(`${title}|${artist}`, url);
        removeArtButton(title, artist);
      }
    });
  });
}

// ─── ALBUM ART (Deezer API — no key, CORS-friendly) ──────────────────────────
const _artCache = {};
const _artPending = {};

const ART_LS_KEY = 'vds_art_cache';
function loadArtFromStorage() {
  try {
    const stored = JSON.parse(localStorage.getItem(ART_LS_KEY)||'{}');
    Object.keys(stored).forEach(k => { stored[k] = _itunesHiRes(stored[k]); });
    Object.assign(_artCache, stored);
  } catch(e) {}
}
function persistArtUrl(key, url) {
  try {
    const stored = JSON.parse(localStorage.getItem(ART_LS_KEY)||'{}');
    stored[key] = url;
    localStorage.setItem(ART_LS_KEY, JSON.stringify(stored));
  } catch(e) {}
}
function removeArtButton(title, artist) {
  const key = `${title}|${artist}`;
  document.querySelectorAll('.art-set-btn').forEach(b => {
    if (b.getAttribute('data-art-key') === key) b.remove();
  });
}

async function fetchAlbumArt(title, artist) {
  const key = `${title}|${artist}`;
  if (_artCache[key]) return _artCache[key];
  if (_artPending[key]) return _artPending[key]; // dedupe concurrent requests

  _artPending[key] = (async () => {
    try {
      const clean = s => (s||'').replace(/"/g,'');
      const q = encodeURIComponent(`artist:"${clean(artist)}" album:"${clean(title)}"`);
      const resp = await fetchDeezer(`https://api.deezer.com/search/album?q=${q}&limit=8`);
      if (!resp.ok) return null;
      const data = await resp.json();
      const albums = data.data || [];
      if (!albums.length) {
        // broader fallback: title + artist without quotes
        const q2 = encodeURIComponent(`${clean(title)} ${clean(artist)}`);
        const resp2 = await fetchDeezer(`https://api.deezer.com/search/album?q=${q2}&limit=8`);
        if (!resp2.ok) return null;
        const data2 = await resp2.json();
        albums.push(...(data2.data || []));
      }
      if (!albums.length) return null;
      const tl = (title||'').toLowerCase(), al = (artist||'').toLowerCase();
      const match =
        albums.find(x => (x.title||'').toLowerCase()===tl && (x.artist?.name||'').toLowerCase().includes(al)) ||
        albums.find(x => tl.length>2 && (x.title||'').toLowerCase().includes(tl)) ||
        albums[0];
      const url = match.cover_xl || match.cover_big || match.cover_medium || '';
      if (url) _artCache[key] = url;
      return url || null;
    } catch(e) { return null; }
    finally { delete _artPending[key]; }
  })();

  return _artPending[key];
}

function initGIS() {
  if (!S.clientId) return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: S.clientId,

function getListeningGoal() {
  try { return JSON.parse(localStorage.getItem('vds_goal') || 'null'); } catch(e) { return null; }

function setListeningGoal(n) {
  if (!n || isNaN(n)) { localStorage.removeItem('vds_goal'); }
  else { localStorage.setItem('vds_goal', JSON.stringify({ target: Number(n) })); }
}
function promptSetGoal() {
  const cur = getListeningGoal();
  const val = prompt('Set your yearly listening goal (number of albums):', cur ? cur.target : '');
  if (val === null) return; // cancelled
  const n = parseInt(val.trim(), 10);
  if (val.trim() === '') { setListeningGoal(null); render(); return; }
  if (isNaN(n) || n < 1) { alert('Please enter a valid number.'); return; }
  setListeningGoal(n);
  render();
}

function calcStreak(allAlbums) {
  const ratedDates = new Set(
    allAlbums
      .filter(a => a.Rating && a.DateAssigned)
      .map(a => normalizeDate(a.DateAssigned))
      .filter(Boolean)
  );
  const todayStr = today();
  const yest = new Date(todayStr); yest.setDate(yest.getDate() - 1);
  const yesterdayStr = yest.toLocaleDateString('en-CA');
  const ratedToday = ratedDates.has(todayStr);
  // Start counting from today if rated, otherwise yesterday
  const startStr = ratedToday ? todayStr : (ratedDates.has(yesterdayStr) ? yesterdayStr : null);
  if (!startStr) return { streak: 0, ratedToday };
  let streak = 0;
  const d = new Date(startStr);
  while (ratedDates.has(d.toLocaleDateString('en-CA'))) {
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return { streak, ratedToday };
}

async function renderHomeGoalAndRecap() {
  let allAlbums = [];
  try { allAlbums = await getAllAlbums(); } catch(e) { allAlbums = []; }

  const completed = allAlbums.filter(a => a.Rating && a.DateAssigned);
  const thisYear = new Date().getFullYear();
  const thisMonthStr = today().slice(0, 7); // YYYY-MM

  const completedThisYear = completed.filter(a => {
    const d = normalizeDate(a.DateAssigned);
    return d && d.startsWith(String(thisYear));
  });

  const completedThisMonth = completed.filter(a => {
    const d = normalizeDate(a.DateAssigned);
    return d && d.startsWith(thisMonthStr);
  });

  const goal = getListeningGoal();
  const monthName = new Date().toLocaleString('default', { month: 'long' });

  // ── Streak widget ──
  const { streak, ratedToday } = calcStreak(allAlbums);
  const streakHtml = streak > 0 ? `
  <div class="card mt-5 p-4 flex items-center gap-4" style="border-color:rgba(255,255,255,0.06)">
    <div class="text-4xl leading-none">${streak >= 7 ? '🔥' : streak >= 3 ? '⚡' : '✨'}</div>

    </div>
    ${streak >= 30 ? `<div class="text-xs font-bold px-2 py-1 rounded-full" style="background:rgba(251,191,36,0.15);color:#fbbf24">🏆 ${streak}d</div>` : ''}
  </div>` : `
  <div class="mt-5 p-3 rounded-xl text-center" style="border:1px dashed rgba(255,255,255,0.08)">
    <p class="text-xs text-gray-500">Rate an album each day to build a streak 🔥</p>
  </div>`;

  // ── Listening goal widget ──
  let goalHtml = '';
  if (goal) {
    const pct = Math.min(100, Math.round((completedThisYear.length / goal.target) * 100));
    const remaining = Math.max(0, goal.target - completedThisYear.length);
    const daysLeft = Math.max(0, Math.ceil((new Date(thisYear, 11, 31) - new Date()) / 86400000));
    const pace = daysLeft > 0 ? (remaining / daysLeft * 30).toFixed(1) : 0;
    goalHtml = `
    <div class="card mt-5 p-4" style="border-color:rgba(255,255,255,0.06)">
      <div class="flex items-center justify-between mb-3">

      </div>

        <span class="ml-auto text-xs font-bold px-2 py-0.5 rounded-full" style="background:var(--a)/15;color:var(--at)">${pct}%</span>
      </div>
      <div class="w-full rounded-full overflow-hidden" style="height:6px;background:rgba(255,255,255,0.08)">
        <div style="height:6px;width:${pct}%;background:var(--a);border-radius:999px;transition:width 0.6s ease"></div>
      </div>
      ${remaining > 0 ? `<p class="text-xs text-gray-500 mt-2">${remaining} to go · ~${pace} per month to finish on time</p>` : `<p class="text-xs mt-2" style="color:var(--at)">🎉 Goal reached!</p>`}
    </div>`;
  } else {
    goalHtml = `
    <div class="mt-5 p-3 rounded-xl text-center cursor-pointer transition-all hover:bg-white/5" style="border:1px dashed rgba(255,255,255,0.1)" onclick="promptSetGoal()">
      <p class="text-xs text-gray-500">🎯 Set a yearly listening goal</p>
    </div>`;
  }

  // ── Monthly recap ──
  let recapHtml = '';
  if (completedThisMonth.length > 0) {
    const ratings = completedThisMonth.map(a => Number(a.Rating)).filter(r => !isNaN(r));
    const avg = ratings.length ? (ratings.reduce((s,r) => s+r, 0) / ratings.length).toFixed(1) : '—';
    const best = completedThisMonth.reduce((b, a) => (Number(a.Rating) > Number(b.Rating) ? a : b), completedThisMonth[0]);
    const bestTitle = best.AlbumTitle ? best.AlbumTitle.replace(/\*$/, '') : '—';
    const bestArtist = best.Artist || '';
    recapHtml = `
    <div class="card mt-4 p-4" style="border-color:rgba(255,255,255,0.06)">
      <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-semibold text-white">📅 ${monthName} So Far</span>
        <span class="text-xs text-gray-500">${completedThisMonth.length} album${completedThisMonth.length !== 1 ? 's' : ''} rated</span>
      </div>
      <div class="grid grid-cols-3 gap-3">
        <div class="text-center p-2 rounded-lg" style="background:rgba(255,255,255,0.04)">
          <div class="text-2xl font-black" style="color:var(--at)">${completedThisMonth.length}</div>
          <div class="text-xs text-gray-500 mt-0.5">Listened</div>
        </div>
        <div class="text-center p-2 rounded-lg" style="background:rgba(255,255,255,0.04)">
          <div class="text-2xl font-black" style="color:var(--at)">${avg}</div>
          <div class="text-xs text-gray-500 mt-0.5">Avg Rating</div>
        </div>
        <div class="text-center p-2 rounded-lg cursor-pointer hover:bg-white/10 transition-colors" style="background:rgba(255,255,255,0.04)" onclick="navigate('album/${encodeURIComponent(bestTitle+' — '+bestArtist)}')">
          <div class="text-xl font-black" style="color:var(--at)">⭐</div>
          <div class="text-xs text-gray-500 mt-0.5">Best</div>
        </div>
      </div>
      <div class="mt-3 pt-3" style="border-top:1px solid rgba(255,255,255,0.06)">
        <p class="text-xs text-gray-500">Best this month</p>
        <p class="text-sm font-semibold text-white mt-0.5">${bestTitle}</p>
        <p class="text-xs mt-0.5" style="color:var(--at)">${bestArtist} · ${best.Rating}/10</p>
      </div>
    </div>`;
  }

  // ── On This Day ──
  const todayMD = today().slice(5); // MM-DD
  const thisYearStr = String(new Date().getFullYear());
  const onThisDay = completed.filter(a => {
    const d = normalizeDate(a.DateAssigned);
    return d && d.slice(5) === todayMD && d.slice(0,4) !== thisYearStr;
  }).sort((a,b) => normalizeDate(b.DateAssigned).localeCompare(normalizeDate(a.DateAssigned)));
  let onThisDayHtml = '';
  if (onThisDay.length > 0) {
    const rc = r => { const n=Number(r); if(n>=9)return'#4ade80'; if(n>=7)return'#c4b5fd'; if(n>=5)return'#fbbf24'; return'#f87171'; };
    onThisDayHtml = `
    <div class="card mt-4 p-4" style="border-color:rgba(255,255,255,0.06)">
      <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-semibold text-white">📅 On This Day</span>
        <span class="text-xs text-gray-500">${onThisDay.length} album${onThisDay.length!==1?'s':''}</span>
      </div>
      <div class="flex flex-col gap-2">
        ${onThisDay.map(a => {
          const year = normalizeDate(a.DateAssigned).slice(0,4);
          const title = cleanTitle(a.AlbumTitle||'');
          return `<div class="flex items-center gap-3 cursor-pointer hover:bg-white/5 rounded-lg px-1 -mx-1 py-0.5 transition-colors" onclick="navigate('artist/'+encodeURIComponent('${(a.Artist||'').replace(/'/g,"\\'").replace(/"/g,'\\"')}'))">
            <span class="text-xs font-bold w-10 flex-shrink-0" style="color:var(--at)">${year}</span>
            <div class="flex-1 min-w-0">
              <div class="text-sm text-white font-medium truncate">${title}</div>
              <div class="text-xs text-gray-500">${a.Artist||''}</div>
            </div>
            ${a.Rating ? `<span class="text-sm font-black flex-shrink-0" style="color:${rc(a.Rating)}">${a.Rating}</span>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  return streakHtml + goalHtml + recapHtml + onThisDayHtml;
}

function toggleLibFilters() {
  const panel = el('lib-filters');
  if (panel) panel.classList.toggle('hidden');
}
function clearLibFilters() {
  const g = el('lib-genre'); if (g) g.value = '';
  const s = el('lib-status'); if (s) s.value = '';
  const d = el('lib-decade'); if (d) d.value = '';
  const yr = el('lib-year'); if (yr) yr.value = yr.min;
  const rt = el('lib-rating'); if (rt) rt.value = '0';
  filterLibrary();
}
function filterLibrary() {
  const q = (el('lib-search')||{}).value||'';
  const genre = (el('lib-genre')||{}).value||'';
  const status = (el('lib-status')||{}).value||'';
  const decade = parseInt((el('lib-decade')||{}).value||'0')||0;
  const yearSlider = el('lib-year');
  const exactYear = yearSlider ? parseInt(yearSlider.value) : 0;
  const yearSentinel = yearSlider ? parseInt(yearSlider.min) : 0;
  const yearActive = exactYear > yearSentinel;
  const yearLabel = el('lib-year-label');
  if (yearLabel) yearLabel.textContent = yearActive ? String(exactYear) : 'Any';
  const exactRating = parseFloat((el('lib-rating')||{}).value||'0')||0;
  const ratingLabel = el('lib-rating-label');
  if (ratingLabel) ratingLabel.textContent = exactRating > 0 ? String(exactRating) : 'Any';
  const albums = window._libraryAlbums||[];
  const filtered = albums.filter(a => {
    if (q && !((a.AlbumTitle||'').toLowerCase().includes(q.toLowerCase()) || (a.Artist||'').toLowerCase().includes(q.toLowerCase()))) return false;
    if (genre && a.Genre!==genre) return false;
    if (status && a.Status!==status) return false;
    if (decade && Math.floor(Number(a.Year)/10)*10 !== decade) return false;
    if (yearActive && String(a.Year) !== String(exactYear)) return false;
    if (exactRating > 0 && parseFloat(a.Rating) !== exactRating) return false;
    return true;
  });
  // Update filter badge count
  const activeCount = [genre, status, decade ? '1' : '', yearActive ? '1' : '', exactRating ? '1' : ''].filter(Boolean).length;
  const badge = el('lib-filter-count');
  if (badge) { badge.textContent = activeCount; badge.classList.toggle('hidden', activeCount === 0); }
  const res = el('lib-results');
  if (!res) return;
  if (!filtered.length) { res.innerHTML=`<p class="text-gray-500 text-center py-12">No albums match your filters.</p>`; return; }
  res.innerHTML = filtered.map(a => albumCard(a, true)).join('');
  loadLazyArt();
}

const relistenTag = `<span class="px-1.5 py-0.5 rounded text-xs bg-orange-500/20 text-orange-300 font-medium">Relisten</span>`;
const needsRelisten = (title) => (title||'').includes('*');
const cleanTitle = (title) => (title||'').replace(/\*/g,'').trim();

function albumCard(a, showRating=false) {
  const rawTitle = a.AlbumTitle||a.album_title||'Unknown Album';
  const title = cleanTitle(rawTitle);
  const relisten = needsRelisten(rawTitle);
  const artist = a.Artist||a.artist||'Unknown';
  const year = a.Year||a.year||'';
  const genre = a.Genre||a.genre||'';
  const status = a.Status||a.status||'';
  const rating = a.Rating||a.rating||'';
  const link = a.AlbumLink||a.album_link||'';
  const esc = s => (s||'').replace(/"/g,'&quot;');
  const hasArt = !!_artCache[`${title}|${artist}`];
  // Rank = this row's position in the full, unfiltered "Ranked albums" sheet (rowIndex 2 → #1).
  // Always computed off the full list, not the currently-filtered/searched one, so ranks stay
  // stable (and meaningful as a master ranking) no matter what filter is applied.
  const libRows = (window._libraryAlbums||[]).map(x=>x.rowIndex);
  const rank = a.rowIndex ? a.rowIndex - 1 : null;
  const isFirst = !libRows.length || a.rowIndex === Math.min(...libRows);
  const isLast = !libRows.length || a.rowIndex === Math.max(...libRows);
  return `<div class="card flex items-center gap-4 cursor-pointer hover:border-gray-700 transition-colors" onclick="showAlbumDetail(${JSON.stringify(JSON.stringify(a)).slice(1,-1)})">
    ${rank ? `<div class="flex flex-col items-center justify-center gap-0.5 flex-shrink-0 w-6" onclick="event.stopPropagation()">
      <button onclick="moveLibraryRow(${a.rowIndex},'up')" ${isFirst?'disabled':''} title="Move up" class="text-gray-500 hover:text-purple-400 disabled:opacity-20 disabled:cursor-not-allowed leading-none text-xs">▲</button>
      <span class="text-gray-500 text-xs font-bold cursor-pointer hover:text-purple-400 hover:underline" onclick="moveLibraryRowTo(${a.rowIndex})" title="Click to jump straight to a rank">#${rank}</span>
      <button onclick="moveLibraryRow(${a.rowIndex},'down')" ${isLast?'disabled':''} title="Move down" class="text-gray-500 hover:text-purple-400 disabled:opacity-20 disabled:cursor-not-allowed leading-none text-xs">▼</button>
    </div>` : ''}
    <div class="w-28 h-28 rounded-xl overflow-hidden flex-shrink-0 bg-gradient-to-br from-purple-900 to-violet-950 flex items-center justify-center text-white">
      <div class="art-placeholder w-full h-full flex items-center justify-center" data-title="${esc(title)}" data-artist="${esc(artist)}">${icons.music}</div>
    </div>
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="text-white font-semibold text-lg truncate">${title}</span>
        ${relisten ? relistenTag : ''}
      </div>
      <div class="text-gray-400 text-sm flex items-center gap-2 mt-1 flex-wrap">
        <span class="hover:underline cursor-pointer" style="color:var(--at)" onclick="event.stopPropagation();navigate('artist/'+encodeURIComponent('${artist.replace(/'/g,"\\'")}'))">${artist}</span>
        ${year?`<span>· ${year}</span>`:''}
        ${genre?`<span class="genre-pill">${genre}</span>`:''}
        ${status?`<span class="px-1.5 py-0.5 rounded text-xs ${STATUS_COLORS[status]||'text-gray-400'}">${status}</span>`:''}
      </div>
    </div>
    ${showRating && rating ? `<div class="flex items-center gap-1 text-amber-400 font-bold flex-shrink-0"><span>${icons.star}</span>${rating}</div>` : ''}
    ${link ? `<a href="${link}" target="_blank" onclick="event.stopPropagation()" class="text-gray-500 hover:text-purple-400 flex-shrink-0">${icons.link}</a>` : ''}
    ${a.Review ? `<button onclick="event.stopPropagation();showReview(${a.rowIndex})" title="Read review" class="flex-shrink-0 text-gray-500 hover:text-purple-400 transition-colors p-1 rounded text-base leading-none">💬</button>` : ''}
    <button onclick="event.stopPropagation();showCardMenu(this,'library','${escJsAttr(title)}','${escJsAttr(artist)}',${a.rowIndex||0},${relisten})" title="Options" class="flex-shrink-0 text-gray-500 hover:text-gray-300 transition-colors p-1 rounded leading-none" style="font-size:20px;letter-spacing:0">⋮</button>
  </div>`;
}

function showAlbumDetail(albumJson) {
  try {
    const a = JSON.parse(albumJson.replace(/\\"/g,'"'));

}


// ─── ALBUM DETAIL PAGE ───────────────────────────────────────────────────────
function renderAlbumDetail(a) {
  if (!a) return `<div class="p-6">${errBox('Album not found')}<button class="btn-gray mt-4" onclick="history.back()">Back</button></div>`;
  const title = a.AlbumTitle||a.album_title||'Unknown Album';
  const artist = a.Artist||a.artist||'Unknown';
  const year = a.Year||a.year||'';
  const genre = a.Genre||a.genre||'';
  const status = a.Status||a.status||'';

async function renderStats() {
  const albums = await getAllAlbums();
  const completed = albums.filter(a => a.Status === 'Completed');
  const total = albums.length;
  const comp = completed.length;
  const remaining = total - comp;
  const ratings = completed.map(a => Number(a.Rating)).filter(n => n > 0);
  const avgRating = ratings.length ? (ratings.reduce((s, n) => s + n, 0) / ratings.length).toFixed(1) : '—';
  const progress = total ? Math.round((comp / total) * 100) : 0;

  // Rating distribution 1–10
  const distData = Array(10).fill(0);
  ratings.forEach(r => { const i = Math.min(Math.max(Math.round(r), 1), 10) - 1; distData[i]++; });

  // Rating timeline by month
  const monthMap = {};
  completed.forEach(a => {
    const nd = normalizeDate(a.DateAssigned || '');
    if (!nd || !a.Rating) return;
    const ym = nd.slice(0, 7);
    if (!monthMap[ym]) monthMap[ym] = { sum: 0, count: 0 };
    monthMap[ym].sum += Number(a.Rating);
    monthMap[ym].count++;
  });
  const timelineLabels = Object.keys(monthMap).sort();
  const timelineData = timelineLabels.map(ym => +(monthMap[ym].sum / monthMap[ym].count).toFixed(2));

  // Genre breakdown
  const genreMap = {};
  completed.forEach(a => {
    if (!a.Genre) return;
    if (!genreMap[a.Genre]) genreMap[a.Genre] = { count: 0, sum: 0 };
    genreMap[a.Genre].count++;
    genreMap[a.Genre].sum += Number(a.Rating || 0);

  const genreBreakdown = Object.entries(genreMap)
    .map(([g, d]) => ({ genre: g, count: d.count, avg: d.count ? d.sum / d.count : 0 }))
    .sort((a, b) => b.count - a.count).slice(0, 14);

  // Decade breakdown
  const decadeMap = {};
  completed.forEach(a => {
